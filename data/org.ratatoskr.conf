<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Daemon (root) owns the bus name -->
  <policy user="root">
    <allow own="org.ratatoskr"/>
  </policy>

  <!-- All users can read and send commands -->
  <policy context="default">
    <allow send_destination="org.ratatoskr"/>
    <allow receive_sender="org.ratatoskr"/>
  </policy>
</busconfig>
